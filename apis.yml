aid: sungard-data-systems
name: SunGard Data Systems
description: >-
  SunGard Data Systems was a software and technology services company that
  provided software and processing solutions to financial services, education,
  and the public sector. In November 2015, SunGard was acquired by Fidelity
  National Information Services (FIS) for approximately $9.1 billion. Key
  product lines included SunGard Financial Systems (trading, treasury, risk
  management, capital markets), SunGard AvantGard (cash and liquidity
  management), SunGard K-12 (student information systems), and SunGard Higher
  Education (ERP for universities). Post-acquisition, these products were
  integrated into the FIS portfolio.
